services:
  - type: web
    name: vidyasetu-backend
    runtime: docker
    region: singapore
    plan: free
    branch: main
    rootDir: backend-vidyasetu/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: college_career_knowledge_gemini
      - key: N8N_WHATSAPP_WEBHOOK
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /opt/render/project/src/backend-vidyasetu/backend/service_account.json
    healthCheckPath: /health
    autoDeploy: true
