name: Keep Qdrant Cluster Alive

on:
  schedule:
    # Run every 6 hours to keep the cluster active
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-qdrant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Qdrant Cluster
        run: |
          echo "Pinging Qdrant cluster to keep it alive..."
          
          # Try multiple health endpoints (Qdrant Cloud uses different endpoints)
          for endpoint in "" "/healthz" "/health"; do
            echo "Trying endpoint: ${{ secrets.QDRANT_URL }}${endpoint}"
            
            response=$(curl -s -w "\n%{http_code}" "${{ secrets.QDRANT_URL }}${endpoint}" \
              -H "api-key: ${{ secrets.QDRANT_API_KEY }}" 2>&1 || echo "000")
            
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)
            
            echo "HTTP Status: $http_code"
            
            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 204 ]; then
              echo "✅ Qdrant cluster is alive and healthy"
              echo "Response: $body"
              exit 0
            fi
          done
          
          echo "⚠️ Could not reach Qdrant cluster on any endpoint"
          echo "Last response: $body"
          exit 1
      
      - name: Get Collections Info
        run: |
          echo "Fetching collections information..."
          
          response=$(curl -s "${{ secrets.QDRANT_URL }}/collections" \
            -H "api-key: ${{ secrets.QDRANT_API_KEY }}")
          
          echo "$response" | jq -r '.result.collections[]? | "  - \(.name): \(.points_count) points"' || echo "Could not parse collections"
          
          echo "✅ Collections check completed"
      
      - name: Verify Embeddings Collection
        run: |
          echo "Checking college_career_knowledge_gemini collection..."
          
          response=$(curl -s "${{ secrets.QDRANT_URL }}/collections/college_career_knowledge_gemini" \
            -H "api-key: ${{ secrets.QDRANT_API_KEY }}")
          
          points=$(echo "$response" | jq -r '.result.points_count // "unknown"')
          status=$(echo "$response" | jq -r '.result.status // "unknown"')
          
          echo "  Points: $points"
          echo "  Status: $status"
          
          if [ "$points" != "unknown" ] && [ "$points" != "null" ]; then
            echo "✅ Collection verified successfully"
          else
            echo "⚠️ Collection might not exist or is inaccessible"
          fi
      
      - name: Send Success Notification
        if: success()
        run: |
          echo "🎉 Qdrant cluster ping successful at $(date)"
          echo "Cluster is active and all collections are accessible"
      
      - name: Send Failure Notification
        if: failure()
        run: |
          echo "❌ Qdrant cluster ping failed at $(date)"
          echo "Please check the cluster status manually"
